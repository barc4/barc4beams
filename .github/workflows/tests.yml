name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python310-unsupported:
    name: tests (3.10)
    runs-on: ubuntu-latest

    steps:
      - name: Python 3.10 is no longer supported
        run: echo "barc4beams now requires Python >=3.11; this check remains temporarily for branch protection."

  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e .[dev]

      - name: Run tests
        run: pytest -q
